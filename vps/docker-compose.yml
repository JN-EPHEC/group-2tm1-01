version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: db-kine
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: Kine-web
      MARIADB_DATABASE: kine_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kine-backend
    restart: always
#    ports:
#      - "5000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Kine-web
      DB_NAME: kine_db
    depends_on:
      - db

  frontend:
    build: ./client
    container_name: kine-frontend
    restart: always
    volumes:
      - ./client/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    ports:
      - "5173:443"
    depends_on:
      - backend

  dns-kine:
    build: ./client/dns
    container_name: kine-dns
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"

volumes:
  db_data: