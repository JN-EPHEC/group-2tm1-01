name: Continuous Deployment - Frontend

on:
  push:
    branches:
      - main # Ne se declenche que sur la branche principale

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: Install dependencies and Build
        working-directory: ./client
        run: |
          npm install
          npm run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 54321
          source: "client/dist/*"
          target: "/home/projet/temp_app"
          strip_components: 2

      - name: Final Move and Permissions
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 54321
          script: |
            rm -rf /var/www/html/*
            mv /home/projet/temp_app/* /var/www/html/
            chmod -R 755 /var/www/html
