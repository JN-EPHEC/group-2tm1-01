<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plateforme de prise de rendez-vous et boutique en ligne spécialisée en kinésithérapie." />
    <title>Application Kiné</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Preconnect pour améliorer la vitesse de chargement des CDNs -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    
    <!-- Preload de l'image de fond principale (Hero) pour corriger le LCP request discovery -->
    <link rel="preload" as="image" href="/img/pexels-yankrukov-5793895.jpg" fetchpriority="high" />

    <!-- Styles initiaux pour le App Shell (LCP) -->
    <link rel="stylesheet" href="/src/styles/initial.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body class="bg-light">
    <div id="root">
      <!-- App Shell pour corriger le Element Render Delay -->
      <div class="container-fluid px-4 mt-4" style="padding-top: 56px;">
        <div class="initial-hero-section">
          <div class="initial-hero-content">
            <h1 class="initial-hero-title">Bienvenue chez votre kinésithérapeute</h1>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
